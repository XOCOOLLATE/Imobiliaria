<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Imóveis à venda | Anselmo Pedroso Imóveis</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/front.css?v=2" />
    <link rel="stylesheet" href="../css/front.css?v=2" />
  </head>

  <body>
    <header class="header">
      <div class="container header-content">
        <a href="../index.html" class="logo-area">
          <img src="../img/logo.png" alt="Logo Anselmo Pedroso Imobiliária" />
        </a>

        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
          ☰
        </button>

        <nav class="nav" id="navMenu">
          <a href="imoveis.html">
            <i class="ri-home-4-line"></i>
            Imóveis
          </a>

          <a href="servicos.html">
            <i class="ri-briefcase-4-line"></i>
            Serviços
          </a>

          <a href="sobre.html">
            <i class="ri-user-3-line"></i>
            Sobre
          </a>

          <a href="contato.html">
            <i class="ri-phone-line"></i>
            Contato
          </a>
        </nav>

        <a
          class="btn-header"
          href="https://wa.me/5551995483061"
          target="_blank"
        >
          <i class="ri-whatsapp-line"></i>
          Falar com corretor
        </a>
      </div>
    </header>

    <main class="pagina-imoveis">
      <section class="hero-imoveis">
        <p class="etiqueta">Imóveis selecionados em Guaíba</p>
        <h1>Encontre o imóvel ideal para morar, investir ou empreender</h1>
        <p>
          Veja casas, terrenos e imóveis comerciais representados por Anselmo
          Pedroso, corretor de imóveis, perito avaliador e técnico em
          edificações.
        </p>
      </section>

      <section class="filtros-imoveis">
        <input
          type="text"
          id="buscaImoveis"
          placeholder="Buscar por bairro, rua ou código"
        />

        <select id="tipoImovel">
          <option value="">Todos os tipos</option>
          <option value="casa">Casa</option>
          <option value="terreno">Terreno</option>
          <option value="sobrado">Sobrado</option>
          <option value="comercial">Comercial</option>
        </select>
      </section>

      <section id="listaImoveis" class="grid-imoveis"></section>
    </main>

    <script src="../js/imoveis-dados.js"></script>
    <script src="../js/imoveis-lista.js"></script>
  </body>
</html>
